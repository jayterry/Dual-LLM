name: CI

on:
  push:
  pull_request:

jobs:
  python-backend:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Syntax check (py_compile)
        run: |
          python -m py_compile \
            server.py \
            agent.py \
            guard_llm.py \
            memory_store.py \
            toxic_match.py \
            user_profile.py \
            rag.py \
            logger_util.py \
            build_toxic_db.py

